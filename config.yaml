# system_monitor 配置文件
# 修改后重启服务即可生效

server:
  host: "0.0.0.0"
  port: 5000
  debug: false

collector:
  interval_seconds: 3       # 采集间隔（秒）
  db_save_ticks: 3          # 每 N 次采集写入一次数据库（3×3=9秒）

database:
  # 可选 "sqlite" 或 "mysql"
  type: "sqlite"

  sqlite:
    path: "monitor.db"

  mysql:
    host: "127.0.0.1"
    port: 3306
    user: "root"
    password: ""
    database: "sysmonitor"
    charset: "utf8mb4"

alert:
  cpu_threshold: 90         # CPU 阈值（%）
  memory_threshold: 90      # 内存阈值（%）
  disk_threshold: 90        # 磁盘阈值（%）
  cooldown_minutes: 5       # 同类型告警冷却时间（分钟）

retention:
  metrics_hours: 24         # 指标数据保留时长
  alerts_days: 7            # 告警记录保留时长