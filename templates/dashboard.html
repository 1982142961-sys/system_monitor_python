<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控仪表盘</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Socket.IO CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- 顶部标题栏 -->
    <div class="header">
        <h1>系统资源监控</h1>
        <div class="header-info">
            <span id="sys-hostname">--</span>
            <span id="sys-os">--</span>
            <span id="sys-uptime">--</span>
            <span id="sys-time">--</span>
            <span id="conn-status" style="color:#67C23A">● 已连接</span>
        </div>
    </div>

    <!-- 告警弹窗容器 -->
    <div id="alert-toast" class="alert-toast"></div>

    <!-- 主要图表区域 -->
    <div class="grid">

        <!-- CPU 仪表盘 -->
        <div class="card">
            <div class="card-title">CPU 使用率</div>
            <div id="chart-cpu-gauge" class="chart"></div>
        </div>

        <!-- 内存仪表盘 -->
        <div class="card">
            <div class="card-title">内存使用</div>
            <div id="chart-memory" class="chart"></div>
        </div>

        <!-- Swap 仪表盘 -->
        <div class="card">
            <div class="card-title">Swap 交换分区</div>
            <div id="chart-swap" class="chart"></div>
        </div>

        <!-- 历史趋势折线图（新） -->
        <div class="card card-wide">
            <div class="card-title">CPU / 内存历史趋势（60 分钟）</div>
            <div id="chart-history" class="chart"></div>
        </div>

        <!-- 各核心 CPU -->
        <div class="card card-wide">
            <div class="card-title">各核心 CPU 使用率</div>
            <div id="chart-per-core" class="chart"></div>
        </div>

        <!-- 磁盘使用 -->
        <div class="card card-wide">
            <div class="card-title">磁盘使用</div>
            <div id="chart-disk" class="chart"></div>
        </div>

        <!-- CPU TOP 进程 -->
        <div class="card">
            <div class="card-title">CPU 消耗 TOP</div>
            <div id="chart-top-cpu" class="chart"></div>
        </div>

        <!-- 内存 TOP 进程 -->
        <div class="card">
            <div class="card-title">内存消耗 TOP</div>
            <div id="chart-top-mem" class="chart"></div>
        </div>

    </div>

    <div class="footer">
        WebSocket 实时推送 | <span id="last-update">--</span>
    </div>

    <script>
    // ============================================================
    // 初始化所有 ECharts 图表
    // ============================================================
    var cpuGauge = echarts.init(document.getElementById('chart-cpu-gauge'));
    var memoryChart = echarts.init(document.getElementById('chart-memory'));
    var swapChart = echarts.init(document.getElementById('chart-swap'));
    var historyChart = echarts.init(document.getElementById('chart-history'));
    var perCoreChart = echarts.init(document.getElementById('chart-per-core'));
    var diskChart = echarts.init(document.getElementById('chart-disk'));
    var topCpuChart = echarts.init(document.getElementById('chart-top-cpu'));
    var topMemChart = echarts.init(document.getElementById('chart-top-mem'));

    window.addEventListener('resize', function () {
        [cpuGauge, memoryChart, swapChart, historyChart, perCoreChart, diskChart, topCpuChart, topMemChart]
            .forEach(function (c) { c.resize(); });
    });

    // 颜色常量
    var COLOR_OK = '#67C23A';
    var COLOR_WARN = '#E6A23C';
    var COLOR_DANGER = '#F56C6C';

    function gaugeColor(percent) {
        if (percent < 60) return COLOR_OK;
        if (percent < 85) return COLOR_WARN;
        return COLOR_DANGER;
    }

    // 仪表盘配置
    function makeGaugeOption(title, percent) {
        return {
            series: [{
                type: 'gauge',
                startAngle: 210, endAngle: -30, min: 0, max: 100,
                center: ['50%', '55%'], radius: '90%',
                progress: { show: true, width: 14, itemStyle: { color: gaugeColor(percent) } },
                axisLine: { lineStyle: { width: 14, color: [[0.6, COLOR_OK], [0.85, COLOR_WARN], [1, COLOR_DANGER]] } },
                axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
                detail: { valueAnimation: true, fontSize: 28, fontWeight: 'bold', offsetCenter: [0, '70%'], formatter: '{value}%' },
                title: { offsetCenter: [0, '42%'], fontSize: 13, color: '#999' },
                data: [{ value: percent, name: title }]
            }]
        };
    }

    // ============================================================
    // 历史趋势数据（前端缓存最近 60 分钟）
    // ============================================================
    var historyTimestamps = [];
    var historyCpu = [];
    var historyMemory = [];

    function updateHistoryChart() {
        historyChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['CPU', '内存'], textStyle: { color: '#8899aa' }, top: 0 },
            xAxis: { type: 'category', data: historyTimestamps, axisLabel: { fontSize: 10, rotate: 30 } },
            yAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
            series: [
                {
                    name: 'CPU', type: 'line', smooth: true, data: historyCpu,
                    lineStyle: { color: '#F56C6C', width: 2 },
                    itemStyle: { color: '#F56C6C' },
                    areaStyle: { color: 'rgba(245,108,108,0.1)' }
                },
                {
                    name: '内存', type: 'line', smooth: true, data: historyMemory,
                    lineStyle: { color: '#409EFF', width: 2 },
                    itemStyle: { color: '#409EFF' },
                    areaStyle: { color: 'rgba(64,158,255,0.1)' }
                }
            ],
            grid: { top: 30, right: 20, bottom: 40, left: 40 },
            dataZoom: [{ type: 'inside', start: 0, end: 100 }]
        });
    }

    // ============================================================
    // 告警弹窗
    // ============================================================
    var toastTimer = null;

    function showAlert(alertData) {
        var toast = document.getElementById('alert-toast');
        var item = document.createElement('div');
        item.className = 'toast-item';
        item.textContent = '[告警] ' + alertData.message;
        toast.appendChild(item);

        // 5 秒后自动消失
        setTimeout(function () { item.remove(); }, 5000);
    }

    // ============================================================
    // 更新所有实时图表
    // ============================================================
    function updateCharts(data) {
        document.getElementById('sys-hostname').textContent = data.system.hostname;
        document.getElementById('sys-os').textContent = data.system.os;
        document.getElementById('sys-uptime').textContent = '运行: ' + data.system.uptime;
        document.getElementById('sys-time').textContent = data.timestamp;
        document.getElementById('last-update').textContent = data.timestamp;

        // CPU 仪表盘
        cpuGauge.setOption(makeGaugeOption('CPU', Math.round(data.cpu.percent)));

        // 内存仪表盘（显示已用/总量）
        var memOpt = makeGaugeOption('内存', Math.round(data.memory.percent));
        memOpt.series[0].detail.formatter = function () {
            return data.memory.used_gb + ' / ' + data.memory.total_gb + ' GB';
        };
        memOpt.series[0].detail.fontSize = 14;
        memoryChart.setOption(memOpt);

        // Swap 仪表盘
        swapChart.setOption(makeGaugeOption('Swap', Math.round(data.memory.swap_percent)));

        // 各核心 CPU
        perCoreChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: data.cpu.per_core.map(function (v, i) { return '核' + i; }), axisLabel: { fontSize: 10 } },
            yAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
            series: [{
                type: 'bar', data: data.cpu.per_core,
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1,
                        [{ offset: 0, color: '#409EFF' }, { offset: 1, color: '#79bbff' }]),
                    borderRadius: [4, 4, 0, 0]
                },
                label: { show: true, position: 'top', formatter: '{c}%', fontSize: 10 }
            }],
            grid: { top: 20, right: 20, bottom: 30, left: 40 }
        });

        // 磁盘使用
        diskChart.setOption({
            tooltip: { trigger: 'axis', formatter: function (p) { return p[0].name + ': ' + p[0].value + '%'; } },
            xAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
            yAxis: { type: 'category', data: data.disks.map(function (d) { return d.mountpoint; }), axisLabel: { fontSize: 11 } },
            series: [{
                type: 'bar', data: data.disks.map(function (d) { return d.percent; }),
                label: {
                    show: true, position: 'right',
                    formatter: function (p) { return data.disks[p.dataIndex].used_gb + ' / ' + data.disks[p.dataIndex].total_gb + ' GB'; },
                    fontSize: 10, color: '#666'
                },
                itemStyle: { color: function (p) { return gaugeColor(p.value); }, borderRadius: [0, 4, 4, 0] }
            }],
            grid: { top: 10, right: 100, bottom: 20, left: 80 }
        });

        // CPU TOP
        topCpuChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'value', axisLabel: { formatter: '{value}%' } },
            yAxis: { type: 'category', data: data.processes.top_cpu.map(function (p) { return p.name; }).reverse(), axisLabel: { fontSize: 10 } },
            series: [{
                type: 'bar', data: data.processes.top_cpu.map(function (p) { return p.value; }).reverse(),
                itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#f56c6c' }, { offset: 1, color: '#fab6b6' }]), borderRadius: [0, 4, 4, 0] },
                label: { show: true, position: 'right', formatter: '{c}%', fontSize: 10 }
            }],
            grid: { top: 10, right: 35, bottom: 20, left: 65 }
        });

        // 内存 TOP
        topMemChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'value', axisLabel: { formatter: '{value}%' } },
            yAxis: { type: 'category', data: data.processes.top_mem.map(function (p) { return p.name; }).reverse(), axisLabel: { fontSize: 10 } },
            series: [{
                type: 'bar', data: data.processes.top_mem.map(function (p) { return p.value; }).reverse(),
                itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#409eff' }, { offset: 1, color: '#a0cfff' }]), borderRadius: [0, 4, 4, 0] },
                label: { show: true, position: 'right', formatter: '{c}%', fontSize: 10 }
            }],
            grid: { top: 10, right: 35, bottom: 20, left: 65 }
        });
    }

    // ============================================================
    // 加载历史数据（页面打开时通过 /api/history 获取）
    // ============================================================
    function loadHistory() {
        fetch('/api/history')
            .then(function (r) { return r.json(); })
            .then(function (rows) {
                historyTimestamps = rows.map(function (r) { return r.timestamp.substring(11, 16); });
                historyCpu = rows.map(function (r) { return r.cpu_percent; });
                historyMemory = rows.map(function (r) { return r.memory_percent; });
                updateHistoryChart();
            });
    }

    // ============================================================
    // WebSocket 连接
    // ============================================================
    var socket = io();

    socket.on('connect', function () {
        document.getElementById('conn-status').textContent = '● 已连接';
        document.getElementById('conn-status').style.color = '#67C23A';
    });

    socket.on('disconnect', function () {
        document.getElementById('conn-status').textContent = '● 断开';
        document.getElementById('conn-status').style.color = '#F56C6C';
    });

    // 收到实时指标
    socket.on('metrics_update', function (data) {
        updateCharts(data);
    });

    // 收到历史数据（服务端 connect 事件推送）
    socket.on('history_data', function (rows) {
        historyTimestamps = rows.map(function (r) { return r.timestamp.substring(11, 16); });
        historyCpu = rows.map(function (r) { return r.cpu_percent; });
        historyMemory = rows.map(function (r) { return r.memory_percent; });
        updateHistoryChart();
    });

    // 收到告警
    socket.on('alert', function (data) {
        data.alerts.forEach(function (a) { showAlert(a); });
    });

    // 页面加载：拉一次历史
    loadHistory();
    </script>

</body>
</html>
